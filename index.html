<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#354024">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Worship">
  <title>Worship Signal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="core/theme.css">
</head>
<body>
  <div id="app">
    <div class="screen sys-screen col center"><div style="color:#E5D7C4;">Loading…</div></div>
  </div>

  <!-- ЯДРО (порядок важен) -->
  <script src="core/store.js"></script>
  <script src="core/i18n.js"></script>
  <script src="core/auth.js"></script>
  <script src="core/data.js"></script>
  <script src="core/bible.js"></script>
  <script src="core/drive.js"></script>
  <script src="core/sync.js"></script>
  <script src="core/presence.js"></script>
  <script src="core/projector.js"></script>
  <script src="core/log.js"></script>
  <script src="core/ui.js"></script>
  <script src="core/qrcode.js"></script>
  <script src="core/splash.js"></script>

  <!-- МОДУЛИ ЭКРАНОВ -->
  <script src="modules/chat.js"></script>
  <script src="modules/pin.js"></script>
  <script src="modules/role.js"></script>
  <script src="modules/settings.js"></script>
  <script src="modules/admin.js"></script>
  <script src="modules/hymns.js"></script>
  <script src="modules/stage.js"></script>
  <script src="modules/chair.js"></script>
  <script src="modules/operator.js"></script>
  <script src="modules/programs.js"></script>
  <script src="modules/schedule.js"></script>
  <script src="modules/follow.js"></script>

  <!-- СТАРТ -->
  <script src="core/app.js"></script>
  <script>
    document.addEventListener('dblclick', e => e.preventDefault(), { passive:false });

    // PWA: регистрация service worker + принудительная проверка обновлений
    if('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('service-worker.js').then(function(reg){
          reg.update();
          // проверять обновление каждый раз при возврате в приложение
          document.addEventListener('visibilitychange', function(){ if(!document.hidden) reg.update(); });
        }).catch(function(){});
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          if(refreshing) return; refreshing = true; window.location.reload();
        });
      });
    }

    window.addEventListener('DOMContentLoaded', function(){
      try { WS.App.boot(); }
      catch(e){ document.getElementById('app').innerHTML = '<div class="pad" style="color:#E5D7C4">Error: ' + (e.message||e) + '</div>'; }
    });
  </script>
</body>
</html>
