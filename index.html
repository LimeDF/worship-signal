<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#354024">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Worship Signal</title>
  <link rel="stylesheet" href="core/theme.css">
</head>
<body>
  <div id="app">
    <div class="screen sys-screen col center">
      <div style="color:#E5D7C4;">Загрузка…</div>
    </div>
  </div>

  <!-- Порядок важен: сначала ядро, потом модули экранов, затем app.js -->
  <!-- ЯДРО -->
  <script src="core/store.js"></script>
  <script src="core/auth.js"></script>
  <script src="core/data.js"></script>
  <script src="core/sync.js"></script>
  <script src="core/presence.js"></script>
  <script src="core/projector.js"></script>
  <script src="core/log.js"></script>
  <script src="core/ui.js"></script>

  <!-- МОДУЛИ ЭКРАНОВ (каждый можно править независимо) -->
  <script src="modules/chat.js"></script>
  <script src="modules/pin.js"></script>
  <script src="modules/role.js"></script>
  <script src="modules/settings.js"></script>
  <script src="modules/admin.js"></script>
  <script src="modules/hymns.js"></script>
  <script src="modules/stage.js"></script>
  <script src="modules/chair.js"></script>
  <script src="modules/operator.js"></script>
  <script src="modules/programs.js"></script>

  <!-- СТАРТ (последним) -->
  <script src="core/app.js"></script>
  <script>
    // блокируем двойной тап-зум на iOS
    document.addEventListener('dblclick', e => e.preventDefault(), { passive:false });
    // запуск
    window.addEventListener('DOMContentLoaded', function(){
      try { WS.App.boot(); }
      catch(e){
        document.getElementById('app').innerHTML =
          '<div class="pad" style="color:#E5D7C4">Ошибка запуска: ' + (e.message||e) + '</div>';
      }
    });
  </script>
</body>
</html>
